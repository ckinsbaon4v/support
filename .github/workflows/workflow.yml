name: GitHub Issue Automation Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Prevents the bot from running non-stop
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Automation Bot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python bot.py

